    if (!navigator.geolocation) {
      reject(new Error("Geolocation tidak didukung perangkat ini."));
      return;
    }
    navigator.geolocation.getCurrentPosition(pos => resolve({

      enableHighAccuracy: true,
      timeout: 10000
    });
  });
}
